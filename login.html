<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Guru</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="width: 400px;">
    <a href="index.html"><button>← Kembali</button></a>
    <h2>Login Guru</h2>
    
    <form id="formLogin">
      <input type="password" id="password" placeholder="Masukkan Password Guru" required>
      <button type="submit">Masuk</button>
    </form>
    <p id="pesanError" style="color:red; text-align:center;"></p>
  </div>

  <script>
    const PASSWORD_GURU = "guru123"; // <-- Ganti password guru disini 

    document.getElementById('formLogin').addEventListener('submit', (e) => {
      e.preventDefault();
      const inputPass = document.getElementById('password').value;
      const pesan = document.getElementById('pesanError');

      if(inputPass === PASSWORD_GURU) {
        localStorage.setItem('loginGuru', 'true'); // tandai sudah login 
        window.location.href = "guru.html"; // arahkan ke dashboard guru
      } else {
        pesan.textContent = "Password salah!";
      }
    });
  </script>
</body>
</html>
