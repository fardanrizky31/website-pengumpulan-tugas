<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Siswa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="index.html"><button>← Kembali</button></a>
    <h2>Form Pengumpulan Tugas</h2>
    
    <form id="formTugas">
      <input type="text" id="nama" placeholder="Nama Siswa" required><br>
      <input type="text" id="mapel" placeholder="Mata Pelajaran" required><br>
      <input type="text" id="judul" placeholder="Judul Tugas" required><br>
      <input type="file" id="file" required><br>
      <button type="submit">Kirim Tugas</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
